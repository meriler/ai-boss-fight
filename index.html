<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Научи ИИ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%A7%A0</text></svg>">
<style>
  :root{ --bg:#0b0e14; --panel:rgba(14,19,28,.85); --line:#2a3445; --accent:#7aa2ff; --ok:#46e08a; --text:#eef3fb; --muted:#9aa6b8;
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--text);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif;touch-action:manipulation;user-select:none;-webkit-user-select:none;overscroll-behavior:none}
  #app{position:fixed;inset:0;height:100dvh;width:100vw;overflow:hidden}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #cv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  /* ВЕРХ: что ИИ видит (герой экрана) */
  #see{position:absolute;left:0;right:0;top:0;padding:calc(10px + var(--safe-t)) 12px 10px;
    background:linear-gradient(#000b,transparent);pointer-events:none}
  #seehead{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px;text-shadow:0 1px 3px #000}
  .bar{display:flex;align-items:center;gap:8px;margin:5px 0}
  .bar .lab{flex:0 0 104px;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px #000}
  .bar .track{flex:1;height:14px;background:#0009;border:1px solid #fff2;border-radius:8px;overflow:hidden}
  .bar .track>i{display:block;height:100%;width:0;background:var(--muted);transition:width .12s}
  .bar.top .track>i{background:var(--accent)} .bar.top .lab{color:var(--accent)}
  .bar .pct{flex:0 0 42px;text-align:right;font-size:14px;font-weight:800;color:var(--muted);text-shadow:0 1px 3px #000}
  .bar.top .pct{color:var(--accent)}

  /* большая реакция-эмодзи когда ИИ уверен */
  #react{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(.6);font-size:34vw;opacity:0;
    transition:opacity .15s,transform .15s;pointer-events:none;text-shadow:0 6px 30px #000}
  #react.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

  /* НИЗ: учим позы */
  #bottom{position:absolute;left:0;right:0;bottom:0;padding:10px 12px calc(12px + var(--safe-b));
    background:linear-gradient(transparent,#000d 26%);display:flex;flex-direction:column;gap:10px}
  #hint{font-size:14px;color:var(--text);text-align:center;text-shadow:0 1px 3px #000;min-height:19px;font-weight:600}
  .teachrow{display:flex;gap:10px}
  .teach{flex:1;background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:11px 8px 13px;text-align:center;
    backdrop-filter:blur(6px);transition:border-color .12s,transform .05s;cursor:pointer}
  .teach:active{transform:scale(.97)}
  .teach.rec{border-color:var(--ok);background:rgba(70,224,138,.18)}
  .teach .e{font-size:34px;line-height:1.1}
  .teach .nm{font-size:13px;color:var(--muted);margin-top:1px}
  .teach .ct{font-size:15px;font-weight:800;margin-top:4px}
  .teach .ct b{color:var(--ok)}
  .teach .hold{font-size:11px;color:var(--muted);margin-top:3px}
  #reset{align-self:center;background:none;border:none;color:var(--muted);font-size:13px;padding:4px 10px;cursor:pointer;text-decoration:underline}

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:26px;gap:16px;z-index:20;background:radial-gradient(120% 90% at 50% 12%,#1a2030,#0b0e14)}
  .screen .big{font-size:72px;margin-bottom:-4px}
  .screen h1{font-size:clamp(26px,8vw,40px);margin:0}
  .screen p{color:var(--muted);margin:0;max-width:330px;line-height:1.55;font-size:16px}
  .screen button{border:none;border-radius:16px;padding:16px;font-size:18px;font-weight:800;color:#06160c;background:var(--ok);
    width:min(420px,82vw);cursor:pointer}
  .screen button:active{transform:scale(.98)}
  .badge{background:#10151e;border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:13px;color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid #2a3445;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .retry{background:#27313f!important;color:#fff!important}
</style>
</head>
<body>
<div id="app">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>

  <div id="see" class="hidden">
    <div id="seehead">🧠 ИИ сравнивает твою позу с примерами:</div>
    <div id="bars"></div>
  </div>
  <div id="react"></div>

  <div id="bottom" class="hidden">
    <div id="hint"></div>
    <div class="teachrow" id="teachrow"></div>
    <button id="reset">сбросить и учить заново</button>
  </div>

  <!-- СТАРТ -->
  <div class="screen" id="intro">
    <div class="big">🧠</div>
    <h1>Научи ИИ</h1>
    <p>Покажи камере две свои позы и дай ИИ примеры каждой. Через минуту он начнёт узнавать тебя сам — это и есть машинное обучение.</p>
    <button id="start">▶️ Поехали</button>
    <div class="badge">📷 видео не уходит с устройства — ИИ учится прямо в браузере</div>
  </div>

  <!-- ЗАГРУЗКА -->
  <div class="screen hidden" id="loading">
    <div class="spinner"></div>
    <p id="loadMsg">Запускаю…</p>
    <button id="retry" class="retry hidden">↻ Повторить</button>
  </div>
</div>

<!--
  Библиотеки и модель — SELF-HOST (без Google CDN, легально для РФ).
  В РФ foreign-CDN с июня 2025 режутся «трюком 16 КБ» → tfjs/веса приходят битыми.
  Поэтому всё лежит рядом с index.html (тот же origin, что сайт ИТМО).
  Завендорить (один раз): см. README / коммит self-host. Модель уже в models/movenet/.
-->
<script src="vendor/tf.min.js"></script>
<script src="vendor/pose-detection.min.js"></script>
<script src="vendor/knn-classifier.min.js"></script>
<script>
"use strict";
// fallback на jsDelivr, если vendor/ ещё не завендорили (только локальная отладка)
if (typeof window.tf === 'undefined') {
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"><\/scr'+'ipt>');
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"><\/scr'+'ipt>');
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.6/dist/knn-classifier.min.js"><\/scr'+'ipt>');
}
</script>
<script>
"use strict";
const $=s=>document.querySelector(s);
const DEMO=new URLSearchParams(location.search).has('demo');
const cam=$('#cam'), cv=$('#cv'), ctx=cv.getContext('2d');
const seeEl=$('#see'), barsEl=$('#bars'), reactEl=$('#react'), hintEl=$('#hint'), bottom=$('#bottom'), teachrow=$('#teachrow');

const CLASSES=[{emoji:'🦸',name:'Поза 1'},{emoji:'✌️',name:'Поза 2'}];
let counts=[0,0], detector=null, knn=null, lastPose=null, lastPoseTS=0, predCache=null, audio=null, state='intro';

/* аудио — лёгкий «поп», когда ИИ узнал */
function initAudio(){try{audio=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function pop(freq){if(!audio)return;const t=audio.currentTime,o=audio.createOscillator(),g=audio.createGain();
  o.type='triangle';o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*1.6,t+.12);
  g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.2,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+.18);
  o.connect(g);g.connect(audio.destination);o.start(t);o.stop(t+.2);}

/* UI низа */
function buildTeach(){
  teachrow.innerHTML='';
  CLASSES.forEach((c,i)=>{
    const el=document.createElement('div'); el.className='teach'; el.dataset.i=i;
    el.innerHTML=`<div class="e">${c.emoji}</div><div class="nm">${c.name}</div><div class="ct">примеров: <b>${counts[i]}</b></div><div class="hold">держи, чтобы учить</div>`;
    teachrow.appendChild(el);
  });
  bindHold();
}
function refreshCounts(){[...teachrow.children].forEach((el,i)=>el.querySelector('.ct b').textContent=counts[i]);}
function updateHint(){
  if(counts[0]===0&&counts[1]===0){hintEl.textContent='Покажи первую позу и держи кнопку под ней 👇 — так ты даёшь ИИ примеры';}
  else if(counts[0]===0||counts[1]===0){hintEl.textContent='Теперь научи вторую позу — держи вторую кнопку';}
  else if(counts[0]<5||counts[1]<5){hintEl.textContent='Двигайся — ИИ уже узнаёт! Мало примеров → путается. Добери ещё, меняя угол.';}
  else{hintEl.textContent='ИИ узнаёт твои позы! Запутался? Покажи ему ещё примеров — он станет точнее.';}
}

/* камера + модель */
function setLoad(m,retry){$('#loadMsg').textContent=m;$('#retry').classList.toggle('hidden',!retry);}
async function initCamera(){
  if(DEMO)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw new Error('CAM:нет https');
  let s;try{s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'user'}},audio:false});}
  catch(e){try{s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}catch(e2){throw new Error('CAM:'+e2.name);}}
  cam.srcObject=s; await new Promise(r=>cam.onloadedmetadata=r); await cam.play().catch(()=>{});
  s.getVideoTracks()[0].addEventListener('ended',()=>{hintEl.textContent='📷 камера отвалилась, перезапускаю…';initCamera().catch(()=>{});});
}
const MODEL_URL=new URLSearchParams(location.search).get('model')||'models/movenet/model.json';
async function initModel(){
  await tf.setBackend('webgl').catch(()=>tf.setBackend('cpu')); await tf.ready();
  try{detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,
    {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,modelUrl:MODEL_URL});}
  catch(e){throw new Error('MODEL:'+(e&&e.message||e));}
  knn=knnClassifier.create();
}

/* поза → признаки → классификация */
function feature(kp){const xs=kp.map(k=>k.x),ys=kp.map(k=>k.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const w=(maxX-minX)||1,h=(maxY-minY)||1,f=[];for(const k of kp)f.push((k.x-minX)/w,(k.y-minY)/h);return f;}
function poseOK(p){return p&&p.keypoints&&p.keypoints.filter(k=>k.score>0.3).length>=7;}
let demoClass=0,demoT=0;
function fakePose(){demoT++;if(demoT%80===0)demoClass=(demoClass+1)%2;
  const a=[[.5,.15],[.52,.13],[.48,.13],[.55,.14],[.45,.14],[.62,.32],[.38,.32],[.7,.5],[.3,.5],[.72,.66],[.28,.66],[.58,.6],[.42,.6],[.6,.8],[.4,.8],[.6,.97],[.4,.97]];
  const b=[[.5,.15],[.52,.13],[.48,.13],[.55,.14],[.45,.14],[.62,.32],[.38,.32],[.85,.14],[.15,.14],[.95,.04],[.05,.04],[.58,.6],[.42,.6],[.6,.8],[.4,.8],[.6,.97],[.4,.97]];
  return {keypoints:(demoClass?b:a).map(([x,y])=>({x:x*cv.width,y:y*cv.height,score:.9}))};
}
async function predict(){
  if(!lastPose)return null;
  if(DEMO)return {label:String(demoClass),confidences:{[demoClass]:.9,[1-demoClass]:.1}};
  if(!knn||knn.getNumClasses()<1)return null;
  const t=tf.tensor(feature(lastPose.keypoints));
  const r=await knn.predictClass(t,3); t.dispose(); return r;
}
function addExample(i){
  if(DEMO){counts[i]++;refreshCounts();updateHint();return;}
  if(!lastPose)return;
  const t=tf.tensor(feature(lastPose.keypoints));knn.addExample(t,i);t.dispose();
  counts[i]++;refreshCounts();updateHint();
}

/* реакция — большая эмодзи когда уверен */
let reactT=0;
function updateBars(pred){
  const conf=pred?pred.confidences:{}, top=pred?parseInt(pred.label,10):-1, topV=pred?(conf[top]||0):0;
  barsEl.innerHTML=CLASSES.map((c,i)=>{const v=Math.round((conf[i]||0)*100);
    return `<div class="bar${i===top&&topV>=0.6?' top':''}"><span class="lab">${c.emoji} ${c.name}</span><span class="track"><i style="width:${v}%"></i></span><span class="pct">${v}%</span></div>`;}).join('');
  // показываем большую эмодзи и «попаем» при смене уверенно узнанного класса
  if(top>=0&&topV>=0.75){
    reactEl.textContent=CLASSES[top].emoji;reactEl.classList.add('show');
    if(reactEl._cls!==top){reactEl._cls=top;pop(520);}
  }else{reactEl.classList.remove('show');reactEl._cls=-1;}
}

/* цикл */
let last=performance.now();
async function loop(now){
  const dt=now-last;last=now;
  if(DEMO){lastPose=fakePose();lastPoseTS=now;}
  else if(detector&&(loop._d=(loop._d||0)+dt)>=45){loop._d=0;
    try{const ps=await detector.estimatePoses(cam,{maxPoses:1});
      if(ps&&ps[0]&&poseOK(ps[0])){lastPose=ps[0];lastPoseTS=now;}else if(now-lastPoseTS>500)lastPose=null;}catch(e){}}
  ctx.clearRect(0,0,cv.width,cv.height);
  if(DEMO){const g=ctx.createLinearGradient(0,0,0,cv.height);g.addColorStop(0,'#10243a');g.addColorStop(1,'#0b0e14');ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);}
  else{ctx.save();ctx.translate(cv.width,0);ctx.scale(-1,1);try{ctx.drawImage(cam,0,0,cv.width,cv.height);}catch(e){}ctx.restore();}
  if(lastPose){ctx.fillStyle='#7aa2ff';for(const k of lastPose.keypoints)if(k.score>0.3){const x=DEMO?k.x:cv.width-k.x;ctx.beginPath();ctx.arc(x,k.y,Math.max(4,cv.width*0.008),0,7);ctx.fill();}}
  if((loop._p=(loop._p||0)+dt)>=90){loop._p=0;predCache=await predict();}
  if(state==='play')updateBars(predCache);
  requestAnimationFrame(loop);
}

/* старт */
function resize(){cv.width=cam.videoWidth||window.innerWidth;cv.height=cam.videoHeight||window.innerHeight;}
function enterPlay(){state='play';$('#loading').classList.add('hidden');seeEl.classList.remove('hidden');bottom.classList.remove('hidden');buildTeach();updateHint();}
async function boot(){
  $('#intro').classList.add('hidden');$('#loading').classList.remove('hidden');initAudio();
  try{ setLoad(DEMO?'Демо…':'Запускаю камеру…'); await initCamera(); resize();
       setLoad('Гружу ИИ…'); if(!DEMO)await initModel(); resize(); requestAnimationFrame(loop); enterPlay();
  }catch(e){console.error(e);const m=String(e.message||e);
    setLoad(m.startsWith('CAM:')?'❌ Нет камеры. Разреши доступ/подключи камеру и повтори. ('+m+')':
      m.startsWith('MODEL:')?'❌ ИИ-модель не загрузилась. Нужны файлы models/movenet/ рядом. ('+m+')':
      '❌ Не загрузилось ('+m+'). Повтори.',true);}
}
$('#start').onclick=boot; $('#retry').onclick=boot;
$('#reset').onclick=()=>{if(knn)knn.clearAllClasses();counts=[0,0];predCache=null;refreshCounts();updateHint();reactEl.classList.remove('show');};

/* hold-to-capture на каждую позу */
function bindHold(){
  [...teachrow.children].forEach(el=>{
    const i=+el.dataset.i;let timer=null;
    const start=e=>{e.preventDefault();el.classList.add('rec');addExample(i);timer=setInterval(()=>addExample(i),420);};
    const end=()=>{clearInterval(timer);el.classList.remove('rec');};
    el.addEventListener('pointerdown',start);el.addEventListener('pointerup',end);
    el.addEventListener('pointercancel',end);el.addEventListener('pointerleave',end);
  });
}
window.addEventListener('resize',resize);
if(DEMO)$('.badge').textContent='демо: без камеры, позы фейковые';
</script>
</body>
</html>
